---
# Deploy diarized_transcriber to tela
#
# Usage (run on tela with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e diarized_transcriber_src_dir=<path>
#
# Variables:
#   diarized_transcriber_src_dir: path to checked-out repo on tela

- name: Deploy diarized_transcriber
  hosts: all
  gather_facts: false
  # No global become - podman build runs as the connected user (eddie)

  vars:
    service_name: diarized-transcriber
    quadlet_dir: /etc/containers/systemd
    host_port: 8721
    hf_cache_dir: /home/eddie/.cache/huggingface
    data_dir: /opt/diarized-transcriber
    tmp_dir: /tmp/diarized-transcriber
    diarized_transcriber_src_dir: "{{ ansible_env.HOME }}/diarized_transcriber"

  tasks:
    - name: Ensure data directories exist (root)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: eddie
        group: eddie
        mode: "0755"
      loop:
        - "{{ data_dir }}"
        - "{{ tmp_dir }}"
        - "{{ hf_cache_dir }}"
      become: true

    - name: Build container image from source (as eddie)
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/diarized-transcriber:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ diarized_transcriber_src_dir }}"
      changed_when: true

    - name: Copy quadlet container unit file (root)
      ansible.builtin.copy:
        src: "{{ diarized_transcriber_src_dir }}/deploy/diarized-transcriber.container"
        dest: "{{ quadlet_dir }}/{{ service_name }}.container"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Reload and restart service

    - name: Ensure HuggingFace cache dir exists
      ansible.builtin.file:
        path: "{{ hf_cache_dir }}"
        state: directory
        owner: eddie
        group: eddie
        mode: "0755"
      become: true

  handlers:
    - name: Reload and restart service
      block:
        - name: Reload systemd daemon
          ansible.builtin.systemd:
            daemon_reload: true
          become: true

        - name: Restart diarized-transcriber service
          ansible.builtin.systemd:
            name: "{{ service_name }}"
            state: restarted
            enabled: true
          become: true
