---
# Deploy diarized_transcriber to tela (rootless, user-level Quadlet)
#
# Usage (run on tela as eddie with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e diarized_transcriber_src_dir=<path>
#
# Variables:
#   diarized_transcriber_src_dir: path to checked-out repo on tela

- name: Deploy diarized_transcriber
  hosts: all
  gather_facts: false

  vars:
    service_name: diarized-transcriber
    quadlet_dir: /home/eddie/.config/containers/systemd
    diarized_transcriber_src_dir: "{{ ansible_env.HOME }}/diarized_transcriber"

  tasks:
    - name: Build container image from source
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/diarized-transcriber:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ diarized_transcriber_src_dir }}"
      changed_when: true
      notify: Reload and restart diarized-transcriber

    - name: Tag image for registry
      ansible.builtin.command:
        cmd: >
          podman tag
          localhost/diarized-transcriber:latest
          registry.starbluesolutions.net/diarized-transcriber:{{ build_number | default('latest') }}
      changed_when: true

    - name: Tag image as latest in registry
      ansible.builtin.command:
        cmd: >
          podman tag
          localhost/diarized-transcriber:latest
          registry.starbluesolutions.net/diarized-transcriber:latest
      changed_when: true

    - name: Push build tag to registry
      ansible.builtin.command:
        cmd: podman push registry.starbluesolutions.net/diarized-transcriber:{{ build_number | default('latest') }}
      changed_when: true

    - name: Push latest tag to registry
      ansible.builtin.command:
        cmd: podman push registry.starbluesolutions.net/diarized-transcriber:latest
      changed_when: true

    - name: Copy quadlet container unit file
      ansible.builtin.copy:
        src: "{{ diarized_transcriber_src_dir }}/deploy/diarized-transcriber.container"
        dest: "{{ quadlet_dir }}/diarized-transcriber.container"
        remote_src: true
        mode: "0644"
      notify: Reload and restart diarized-transcriber

  handlers:
    - name: Reload user systemd daemon
      ansible.builtin.command:
        cmd: systemctl --user daemon-reload
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      listen: Reload and restart diarized-transcriber

    - name: Restart diarized-transcriber service
      ansible.builtin.command:
        cmd: systemctl --user restart diarized-transcriber
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      changed_when: true
      listen: Reload and restart diarized-transcriber
